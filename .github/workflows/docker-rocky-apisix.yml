name: Docker APISIX Rocky Amd64

on:
  workflow_dispatch:

jobs:
  build-apisix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2.0.0
        with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the APISIX Docker image
        run: docker build . --file rocky/9/apisix/Dockerfile --tag ghcr.io/tikobus/apisix:3.16-rocky && docker push ghcr.io/tikobus/apisix:3.16-rocky
