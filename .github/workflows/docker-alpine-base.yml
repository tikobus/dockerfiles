name: Docker Alpine Base Amd64

on:
  workflow_dispatch:

jobs:
  build-php81:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2.0.0
        with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker Alpine Base Amd64 image
        run: docker build . --file alpine/3/base/Dockerfile --tag ghcr.io/tikobus/alpine:3.23.4 && docker push ghcr.io/tikobus/alpine:3.23.4
